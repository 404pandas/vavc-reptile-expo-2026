<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Katara Run</title>
    <meta name="robots" content="noindex, nofollow" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Nunito", sans-serif;
        background: linear-gradient(
          160deg,
          #1b2a1c 0%,
          #2e4a1e 50%,
          #1a3a1a 100%
        );
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1.5rem 1rem 2rem;
        gap: 1rem;
      }
      .hero {
        text-align: center;
        color: #fff;
      }
      .hero h1 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2.8rem;
        letter-spacing: 3px;
        margin: 0;
        color: #f9a825;
      }
      .hero p {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.95rem;
        margin-top: 0.25rem;
      }
      .secret-badge {
        display: inline-block;
        background: #f9a825;
        border-radius: 2px;
        padding: 3px 14px;
        font-size: 0.75rem;
        color: #1a1a1a;
        letter-spacing: 2px;
        font-family: "Bebas Neue", sans-serif;
        margin-bottom: 0.5rem;
      }
      .game-card {
        background: #fff;
        border: none;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        padding: 1.25rem;
        width: 100%;
        max-width: 540px;
      }
      #score-row {
        display: flex;
        justify-content: space-between;
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.2rem;
        letter-spacing: 1px;
        color: #616161;
        margin-bottom: 0.75rem;
      }
      #score-row span {
        color: #2e7d32;
      }
      #c {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 10px;
        border: 2px solid #c8e6c9;
        border-bottom: 3px solid #2e7d32;
        touch-action: none;
        background: #fafafa;
      }
      #msg {
        text-align: center;
        font-size: 0.85rem;
        color: #888;
        margin-top: 0.75rem;
        min-height: 20px;
      }
      #tapbtn {
        display: block;
        width: 100%;
        max-width: 240px;
        margin: 1rem auto 0;
        background: #2e7d32;
        color: #fff;
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.3rem;
        letter-spacing: 2px;
        border: none;
        border-radius: 8px;
        padding: 12px 0;
        cursor: pointer;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        transition: opacity 0.2s, transform 0.1s;
      }
      #tapbtn:active {
        transform: scale(0.97);
        opacity: 0.85;
      }
      .paws {
        font-size: 1.5rem;
        letter-spacing: 6px;
        opacity: 0.5;
      }
      .back-link {
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.8rem;
        text-decoration: none;
      }
      .back-link:hover {
        color: #f9a825;
      }
    </style>
  </head>
  <body>
    <div class="hero">
      <div class="secret-badge">VAVC - REPTILE EXPO 2026</div>
      <h1>Puppy Run!</h1>
      <p>Just for the VAVC crew 🐾 Jump over the balls!</p>
    </div>

    <div class="game-card">
      <div id="score-row">
        <div>SCORE: <span id="sc">0</span></div>
        <div>BEST: <span id="bs">0</span></div>
      </div>
      <canvas id="c"></canvas>
      <div id="msg">hold the button or hold space to play</div>
      <button id="tapbtn">🐶 HOLD TO JUMP!</button>
    </div>

    <div class="paws">🐾 🐾 🐾</div>
    <a href="/" class="back-link">← back to expo</a>

    <script>
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      const LW = 400,
        LH = 130,
        GY = 100;
      canvas.width = LW;
      canvas.height = LH;

      let state = "idle",
        score = 0,
        best = 0,
        frame = 0,
        speed = 2.0,
        animId = null;
      let balls = [],
        vavcItems = [],
        nextBall = 150;
      const dog = { x: 60, y: GY, vy: 0, grounded: true, phase: 0 };

      const RAINBOW = [
        "#ff0000",
        "#ff6600",
        "#ffcc00",
        "#33cc33",
        "#3399ff",
        "#9933ff",
        "#ff33cc",
      ];
      const FUR_MAIN = "#d4b483",
        FUR_LIGHT = "#e8d4aa",
        FUR_DARK = "#b8924a",
        FUR_FACE = "#e8cfa0",
        EAR_COLOR = "#c4a060";

      let holdingJump = false;

      function startJump() {
        if (state === "idle" || state === "dead") {
          startGame();
        }
        if (dog.grounded) {
          dog.vy = -9;
          dog.grounded = false;
        }
        holdingJump = true;
      }
      function releaseJump() {
        holdingJump = false;
      }

      const btn = document.getElementById("tapbtn");
      btn.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        startJump();
      });
      btn.addEventListener("pointerup", releaseJump);
      btn.addEventListener("pointerleave", releaseJump);
      btn.addEventListener("pointercancel", releaseJump);

      document.addEventListener("keydown", (e) => {
        if (e.code === "Space" || e.code === "ArrowUp") {
          e.preventDefault();
          if (!e.repeat) startJump();
        }
      });
      document.addEventListener("keyup", (e) => {
        if (e.code === "Space" || e.code === "ArrowUp") releaseJump();
      });

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        startJump();
      });
      canvas.addEventListener("pointerup", releaseJump);
      canvas.addEventListener("pointerleave", releaseJump);
      canvas.addEventListener("pointercancel", releaseJump);

      function drawLhasa(x, y, phase, grounded) {
        ctx.save();
        ctx.translate(x, y);

        // curled wagging tail
        const wag = grounded ? Math.sin(phase * 2.5) * 5 : 8;
        ctx.beginPath();
        ctx.moveTo(-4, -20);
        ctx.quadraticCurveTo(-16, -38 + wag * 0.3, -8, -44 + wag);
        ctx.quadraticCurveTo(-2, -48 + wag, 4, -42 + wag);
        ctx.lineWidth = 5;
        ctx.strokeStyle = FUR_DARK;
        ctx.lineCap = "round";
        ctx.stroke();
        ctx.lineWidth = 2.5;
        ctx.strokeStyle = FUR_LIGHT;
        ctx.beginPath();
        ctx.moveTo(-4, -20);
        ctx.quadraticCurveTo(-13, -36 + wag * 0.3, -6, -41 + wag);
        ctx.stroke();

        // body — stocky lhasa rectangle
        ctx.fillStyle = FUR_MAIN;
        ctx.beginPath();
        ctx.roundRect(-16, -26, 44, 20, 8);
        ctx.fill();
        ctx.fillStyle = FUR_LIGHT;
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.roundRect(-12, -24, 36, 8, 5);
        ctx.fill();
        ctx.globalAlpha = 1;

        // wide round head
        ctx.fillStyle = FUR_FACE;
        ctx.beginPath();
        ctx.arc(24, -30, 16, 0, Math.PI * 2);
        ctx.fill();

        // head fur highlights
        ctx.fillStyle = FUR_LIGHT;
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.ellipse(18, -40, 7, 3.5, -0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(28, -41, 6, 3, 0.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        // left floppy ear
        ctx.fillStyle = EAR_COLOR;
        ctx.beginPath();
        ctx.moveTo(11, -36);
        ctx.quadraticCurveTo(2, -36, 3, -22);
        ctx.quadraticCurveTo(7, -16, 13, -20);
        ctx.quadraticCurveTo(15, -28, 11, -36);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = FUR_LIGHT;
        ctx.globalAlpha = 0.35;
        ctx.beginPath();
        ctx.moveTo(11, -36);
        ctx.quadraticCurveTo(5, -33, 6, -22);
        ctx.quadraticCurveTo(9, -18, 12, -22);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;

        // right floppy ear
        ctx.fillStyle = EAR_COLOR;
        ctx.beginPath();
        ctx.moveTo(37, -36);
        ctx.quadraticCurveTo(46, -36, 45, -22);
        ctx.quadraticCurveTo(41, -16, 35, -20);
        ctx.quadraticCurveTo(33, -28, 37, -36);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = FUR_LIGHT;
        ctx.globalAlpha = 0.35;
        ctx.beginPath();
        ctx.moveTo(37, -36);
        ctx.quadraticCurveTo(43, -33, 42, -22);
        ctx.quadraticCurveTo(39, -18, 36, -22);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;

        // flat muzzle — brachycephalic face
        ctx.fillStyle = FUR_MAIN;
        ctx.beginPath();
        ctx.ellipse(24, -26, 10, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = FUR_LIGHT;
        ctx.beginPath();
        ctx.ellipse(24, -24, 7, 5, 0, 0, Math.PI * 2);
        ctx.fill();

        // wide flat nose
        ctx.fillStyle = "#2a1a1a";
        ctx.beginPath();
        ctx.ellipse(24, -27, 4, 2.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#1a0a0a";
        ctx.beginPath();
        ctx.ellipse(22, -27, 1.2, 1, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(26, -27, 1.2, 1, 0, 0, Math.PI * 2);
        ctx.fill();

        // smile
        ctx.strokeStyle = FUR_DARK;
        ctx.lineWidth = 1;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(20, -22);
        ctx.quadraticCurveTo(24, -20, 28, -22);
        ctx.stroke();

        // tongue out
        ctx.fillStyle = "#e8608a";
        ctx.beginPath();
        ctx.ellipse(24, -19, 3, 3.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#c04070";
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(24, -21);
        ctx.lineTo(24, -16);
        ctx.stroke();

        // large dark round eyes — lhasa trademark
        [17, 31].forEach((ex) => {
          ctx.fillStyle = "#0a0a0a";
          ctx.beginPath();
          ctx.arc(ex, -33, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#2a2a2a";
          ctx.beginPath();
          ctx.arc(ex, -33, 3.8, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "white";
          ctx.beginPath();
          ctx.arc(ex + 1.5, -34.5, 1.8, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(ex - 1, -31.5, 0.7, 0, Math.PI * 2);
          ctx.fill();
        });

        // eyebrow fur tufts
        ctx.fillStyle = FUR_DARK;
        ctx.globalAlpha = 0.65;
        ctx.beginPath();
        ctx.ellipse(17, -39, 5.5, 2, -0.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(31, -39, 5.5, 2, 0.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        // RAINBOW MOHAWK — 7 spikes across the top of the round head
        for (let i = 0; i < 7; i++) {
          const t = i / 6;
          const sx = 12 + t * 24;
          const baseY = -43 - Math.sin(t * Math.PI) * 3;
          const tipY = baseY - 9 - Math.sin(t * Math.PI) * 5;
          ctx.fillStyle = RAINBOW[i];
          ctx.beginPath();
          ctx.moveTo(sx - 2.5, baseY);
          ctx.lineTo(sx, tipY);
          ctx.lineTo(sx + 2.5, baseY);
          ctx.closePath();
          ctx.fill();
        }

        // short stubby legs
        ctx.lineWidth = 4;
        ctx.lineCap = "round";
        ctx.strokeStyle = FUR_DARK;
        const a = grounded ? Math.abs(Math.sin(phase)) * 5 : 0;
        const b = grounded ? Math.abs(Math.sin(phase + Math.PI)) * 5 : 0;
        ctx.beginPath();
        ctx.moveTo(16, -9);
        ctx.lineTo(18, 0 + a);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(16, -9);
        ctx.lineTo(12, 0 - a * 0.4);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-6, -9);
        ctx.lineTo(-4, 0 + b);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-6, -9);
        ctx.lineTo(-10, 0 - b * 0.4);
        ctx.stroke();

        // fluffy paws
        ctx.fillStyle = FUR_LIGHT;
        ctx.beginPath();
        ctx.ellipse(18, 2 + a, 4.5, 2.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(12, 2 - a * 0.4, 4.5, 2.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(-4, 2 + b, 4.5, 2.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(-10, 2 - b * 0.4, 4.5, 2.5, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      const BALL_COLORS = [
        { fill: "#ff4444", shine: "#ff9999", dark: "#cc0000" },
        { fill: "#ff8800", shine: "#ffcc66", dark: "#cc6600" },
        { fill: "#ffcc00", shine: "#ffee88", dark: "#cc9900" },
        { fill: "#44cc44", shine: "#99ee99", dark: "#228822" },
        { fill: "#4488ff", shine: "#99bbff", dark: "#2255cc" },
        { fill: "#aa44ff", shine: "#dd99ff", dark: "#7722cc" },
        { fill: "#ff44aa", shine: "#ff99dd", dark: "#cc2277" },
        { fill: "#44ddcc", shine: "#99eeee", dark: "#229988" },
      ];

      function makeBall(x) {
        const r = 10 + Math.random() * 10;
        const color =
          BALL_COLORS[Math.floor(Math.random() * BALL_COLORS.length)];
        return { x, r, color };
      }

      function drawBall(b) {
        const cx = b.x + b.r,
          cy = GY - b.r;
        ctx.fillStyle = "rgba(0,0,0,0.1)";
        ctx.beginPath();
        ctx.ellipse(cx, GY + 3, b.r * 0.8, 4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = b.color.fill;
        ctx.beginPath();
        ctx.arc(cx, cy, b.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = b.color.dark;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(cx, cy, b.r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = b.color.dark;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(cx - b.r * 0.2, cy, b.r * 0.75, -Math.PI * 0.6, Math.PI * 0.6);
        ctx.stroke();
        ctx.fillStyle = b.color.shine;
        ctx.beginPath();
        ctx.ellipse(
          cx - b.r * 0.3,
          cy - b.r * 0.35,
          b.r * 0.25,
          b.r * 0.15,
          -0.5,
          0,
          Math.PI * 2
        );
        ctx.fill();
      }

      function drawVAVC(v) {
        ctx.font = `bold ${v.size}px 'Nunito',monospace`;
        ctx.fillStyle = `rgba(46,125,50,${v.alpha})`;
        ctx.fillText("VAVC", v.x, v.y);
      }

      function drawGround() {
        ctx.fillStyle = "#bbb";
        ctx.fillRect(0, GY + 2, LW, 2);
        ctx.fillStyle = "#ddd";
        for (let i = 0; i < 10; i++) {
          const rx = (frame * speed * 0.3 + i * 44) % (LW + 10);
          ctx.fillRect(rx, GY + 6, 8 + (i % 3) * 5, 2);
        }
      }

      function collides() {
        for (const b of balls) {
          const cx = b.x + b.r,
            cy = GY - b.r;
          const dx = dog.x + 12 - cx,
            dy = dog.y - 18 - cy;
          if (Math.sqrt(dx * dx + dy * dy) < b.r + 10) return true;
        }
        return false;
      }

      function render() {
        ctx.clearRect(0, 0, LW, LH);
        vavcItems.forEach((v) => drawVAVC(v));
        drawGround();
        balls.forEach((b) => drawBall(b));
        drawLhasa(dog.x, dog.y, dog.phase, dog.grounded);
      }

      function gameLoop() {
        frame++;
        score++;
        speed = 2.0 + Math.floor(score / 150) * 0.3;
        if (frame % 55 === 0)
          vavcItems.push({
            x: LW + 10,
            y: 15 + Math.random() * 30,
            size: 11 + Math.random() * 6,
            alpha: 0.15 + Math.random() * 0.2,
          });
        nextBall--;
        if (nextBall <= 0) {
          balls.push(makeBall(LW + 10));
          if (Math.random() < 0.15) {
            const b2 = makeBall(LW + 10 + 30 + Math.random() * 15);
            b2.r *= 0.7;
            balls.push(b2);
          }
          nextBall = Math.floor(
            140 + Math.random() * 60 - Math.min(score / 80, 35)
          );
        }
        vavcItems = vavcItems.filter((v) => v.x > -60);
        balls = balls.filter((b) => b.x > -60);
        vavcItems.forEach((v) => (v.x -= speed * 0.4));
        balls.forEach((b) => (b.x -= speed));
        dog.vy += holdingJump && !dog.grounded ? 0.13 : 0.5;
        dog.y += dog.vy;
        if (dog.y >= GY) {
          dog.y = GY;
          dog.vy = 0;
          dog.grounded = true;
        }
        if (dog.grounded) dog.phase += 0.2;
        render();
        document.getElementById("sc").textContent = score;
        if (collides()) {
          state = "dead";
          if (score > best) {
            best = score;
            document.getElementById("bs").textContent = best;
          }
          document.getElementById("msg").textContent =
            "Oof! Tap to try again 🐶";
          ctx.fillStyle = "rgba(200,50,50,0.1)";
          ctx.fillRect(0, 0, LW, LH);
          return;
        }
        animId = requestAnimationFrame(gameLoop);
      }

      function startGame() {
        if (animId) cancelAnimationFrame(animId);
        state = "running";
        score = 0;
        frame = 0;
        speed = 2.0;
        balls = [];
        vavcItems = [];
        nextBall = 150;
        holdingJump = false;
        dog.y = GY;
        dog.vy = 0;
        dog.grounded = true;
        dog.phase = 0;
        document.getElementById("msg").textContent =
          "hold button or hold space to jump higher";
        animId = requestAnimationFrame(gameLoop);
      }

      render();
      ctx.fillStyle = "rgba(46,125,50,0.7)";
      ctx.font = "bold 13px 'Bebas Neue',monospace";
      ctx.textAlign = "center";
      ctx.fillText("tap to start!", LW / 2, 50);
    </script>
  </body>
</html>
